<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Camp Finder 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue:#A8C2CE;--blue-dark:#7BA3B4;--blue-light:#D4E4EC;--blue-pale:#EDF4F7;
--beige:#BEAF9A;--beige-dark:#A89474;--beige-light:#D8CEBD;--beige-pale:#F0EBE3;
--ivory:#FFFFFF;--off-white:#FAFAF8;--warm-gray:#F5F3F0;
--teal:#2AA198;--teal-dark:#1E857E;
--navy:#1B3A5C;--navy-light:#264D73;
--text-primary:#2C3E50;--text-secondary:#5A6B7A;--text-muted:#8E99A4;
--shadow-sm:0 1px 3px rgba(44,62,80,0.06);
--shadow-md:0 4px 12px rgba(44,62,80,0.08);
--shadow-lg:0 8px 30px rgba(44,62,80,0.12);
--shadow-xl:0 12px 40px rgba(44,62,80,0.16);
--radius-sm:8px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;
--transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{font-family:'Oswald',sans-serif;background:var(--off-white);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 50%,var(--beige) 100%);padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,0.08) 0%,transparent 60%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:center;max-width:1400px;margin:0 auto 16px;position:relative;z-index:2}
.add-camp-btn{
  font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  padding:8px 18px;border-radius:var(--radius-xl);border:2px solid rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;text-decoration:none;
  transition:var(--transition);white-space:nowrap;backdrop-filter:blur(4px);display:inline-flex;align-items:center;gap:6px;
}
.add-camp-btn:hover{background:rgba(255,255,255,0.3);border-color:#fff;text-decoration:none}
.add-camp-btn svg{width:14px;height:14px}
/* TOP NAV */
.top-nav{background:transparent;padding:0;position:relative;z-index:2}
.top-nav a{font-family:'Oswald',sans-serif;font-weight:300;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.7);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:var(--transition)}
.top-nav a:hover{color:#fff;text-decoration:none}
.top-nav a svg{width:14px;height:14px}

/* BOTTOM FOOTER */
.bottom-bar{max-width:1400px;margin:40px auto 0;padding:24px 16px;text-align:center;border-top:1px solid var(--beige-light)}
.bottom-bar a{font-family:'Oswald',sans-serif;font-weight:500;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:var(--radius-xl);background:var(--beige);transition:var(--transition)}
.bottom-bar a:hover{background:var(--beige-dark);text-decoration:none}
.bottom-bar a svg{width:14px;height:14px}

.hero h1{font-weight:700;font-size:clamp(22px,5vw,34px);color:#fff;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,0.15);position:relative;z-index:2}
.hero p{font-weight:300;font-size:clamp(12px,2vw,15px);color:rgba(255,255,255,0.9);letter-spacing:1.5px;text-transform:uppercase;position:relative;z-index:2}
.hero .camp-count{background:rgba(255,255,255,0.2);padding:3px 14px;border-radius:var(--radius-xl);font-size:12px;font-weight:400;letter-spacing:1px;display:inline-block;margin-top:8px;color:#fff;position:relative;z-index:2}

/* SEARCH */
.search-wrap{max-width:640px;margin:-20px auto 0;position:relative;z-index:10;padding:0 16px}
.search-box{display:flex;align-items:center;background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:4px 4px 4px 16px;border:2px solid transparent;transition:var(--transition)}
.search-box:focus-within{border-color:var(--blue);box-shadow:var(--shadow-xl)}
.search-box svg{width:18px;height:18px;color:var(--text-muted);flex-shrink:0}
.search-input{flex:1;border:none;outline:none;font-family:'Oswald',sans-serif;font-size:14px;font-weight:300;letter-spacing:0.5px;padding:10px 10px;background:transparent;color:var(--text-primary)}
.search-input::placeholder{color:var(--text-muted)}
.search-clear{width:32px;height:32px;border-radius:50%;border:none;background:var(--warm-gray);color:var(--text-muted);cursor:pointer;display:none;align-items:center;justify-content:center;margin-right:4px;transition:var(--transition)}
.search-clear:hover{background:var(--blue-pale);color:var(--blue-dark)}
.search-clear.show{display:flex}

/* FILTERS */
.filter-bar{max-width:1400px;margin:20px auto 0;padding:0 16px}
.filter-toggle{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:8px 0;transition:var(--transition)}
.filter-toggle:hover{color:var(--blue-dark)}
.filter-toggle svg{width:14px;height:14px;transition:transform 0.3s}
.filter-toggle.open svg{transform:rotate(180deg)}
.filter-panel{max-width:1400px;margin:0 auto;padding:0 16px;max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.filter-panel.open{max-height:600px}
.filter-inner{padding:14px 0}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-label{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;width:100%}
.chip{font-size:12px;font-weight:400;letter-spacing:0.5px;padding:6px 14px;border-radius:var(--radius-xl);border:1.5px solid var(--beige-light);background:transparent;color:var(--text-secondary);cursor:pointer;transition:var(--transition);white-space:nowrap}
.chip:hover{border-color:var(--blue);color:var(--blue-dark)}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* SORT & RESULTS BAR */
.results-bar{max-width:1400px;margin:14px auto 0;padding:0 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.results-count{font-size:13px;font-weight:300;color:var(--text-muted);letter-spacing:0.5px}
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-wrap label{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
.sort-select{font-family:'Oswald',sans-serif;font-size:13px;font-weight:400;padding:6px 10px;border:1.5px solid var(--beige-light);border-radius:var(--radius-sm);background:#fff;color:var(--text-primary);cursor:pointer}

/* CAMP GRID */
.camp-grid{max-width:1400px;margin:14px auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

/* CAMP CARD — condensed */
.camp-card{background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1.5px solid transparent;transition:var(--transition);position:relative;display:flex;flex-direction:column;overflow:hidden}
.camp-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--blue-light)}
.camp-card.selected{border-color:var(--blue);box-shadow:var(--shadow-md)}
.card-header{padding:12px 14px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--beige-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;margin-top:1px}
.camp-card.selected .card-check{background:var(--blue);border-color:var(--blue)}
.card-check svg{width:11px;height:11px;color:#fff;opacity:0;transition:var(--transition)}
.camp-card.selected .card-check svg{opacity:1}
.card-title-area{flex:1;min-width:0}
.card-title{font-weight:600;font-size:15px;color:var(--text-primary);letter-spacing:0.3px;line-height:1.25;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-provider{font-weight:300;font-size:11px;color:var(--text-muted);letter-spacing:0.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-body{padding:0 14px 8px;flex:1}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.card-tag{font-size:10px;font-weight:400;letter-spacing:0.7px;text-transform:uppercase;padding:2px 8px;border-radius:var(--radius-xl);background:var(--blue-pale);color:var(--blue-dark)}
.card-details{display:flex;flex-wrap:wrap;gap:3px 12px}
.card-detail{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:400;color:var(--text-secondary);letter-spacing:0.2px}
.card-detail svg{width:12px;height:12px;color:var(--beige);flex-shrink:0}
.card-detail strong{font-weight:500;color:var(--text-primary)}
.card-footer{padding:8px 14px 10px;display:flex;gap:6px;border-top:1px solid var(--warm-gray)}

/* BUTTONS */
.btn{font-family:'Oswald',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;transition:var(--transition);text-decoration:none}
.btn-details{background:var(--navy);color:#fff;font-size:11px;padding:7px 10px;flex:1}
.btn-details:hover{background:var(--navy-light)}
.btn-register{background:var(--teal);color:#fff;font-size:11px;padding:7px 10px;flex:1}
.btn-register:hover{background:var(--teal-dark)}

/* SELECTION BAR */
.selection-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--blue);box-shadow:0 -4px 20px rgba(44,62,80,0.12);padding:10px 16px;z-index:200;display:none;align-items:center;justify-content:center;gap:10px}
.selection-bar.show{display:flex}
.selection-bar .count{font-weight:600;color:var(--blue-dark);font-size:14px}
.selection-bar .btn{font-size:12px;padding:8px 16px}
.btn-compare{background:var(--blue);color:#fff}
.btn-compare:hover{background:var(--blue-dark)}
.btn-export{background:var(--beige);color:#fff}
.btn-export:hover{background:var(--beige-dark)}
.btn-clear{background:var(--warm-gray);color:var(--text-secondary)}
.btn-clear:hover{background:var(--blue-pale)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,62,80,0.5);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);width:100%;max-width:700px;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:var(--warm-gray);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-close:hover{background:var(--blue-pale);color:var(--blue-dark)}
.modal-header{padding:24px 24px 0}
.modal-header h2{font-weight:600;font-size:22px;color:var(--text-primary);letter-spacing:0.5px;margin-bottom:2px}
.modal-header p{font-weight:300;font-size:13px;color:var(--text-muted);letter-spacing:0.5px}
.modal-body{padding:16px 24px 24px}
.modal-section{margin-bottom:16px}
.modal-section h3{font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--beige-dark);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--warm-gray)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.modal-item{font-size:13px}
.modal-item .label{font-weight:300;color:var(--text-muted)}
.modal-item .value{font-weight:500;color:var(--text-primary)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{padding:10px 20px;font-size:13px}

/* COMPARE MODAL */
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--blue-pale);padding:8px 10px;text-align:left;font-weight:500;letter-spacing:0.5px;color:var(--blue-dark);position:sticky;top:0}
.compare-table td{padding:6px 10px;border-bottom:1px solid var(--warm-gray);vertical-align:top}
.compare-table tr:hover td{background:var(--off-white)}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;grid-column:1/-1}
.no-results h3{font-weight:500;font-size:18px;color:var(--text-secondary);margin-bottom:6px}
.no-results p{font-weight:300;font-size:13px;color:var(--text-muted)}

/* RESPONSIVE */
@media(max-width:640px){
  .hero{padding:20px 16px 30px}
  .hero h1{font-size:22px;letter-spacing:1.5px}
  .hero p{font-size:11px}
  .hero-top{margin-bottom:10px}
  .add-camp-btn{font-size:11px;padding:6px 12px;letter-spacing:0.8px}
  .top-nav a{font-size:11px}
  .bottom-bar{margin-top:24px;padding:20px 16px}
  .bottom-bar a{font-size:12px;padding:10px 22px}
  .camp-grid{grid-template-columns:1fr;gap:10px}
  .card-title{font-size:14px}
  .filter-panel.open{max-height:800px}
  .modal{max-height:92vh;border-radius:var(--radius-md)}
  .modal-header{padding:20px 16px 0}
  .modal-body{padding:12px 16px 20px}
  .modal-grid{grid-template-columns:1fr}
  .compare-table{font-size:11px}
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

    <div class="top-nav">
      <a href="https://www.livingsavage.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>

      Add a Camp
    </a>

  <h1>Summer Camp Finder</h1>
  <p>Summer Camps within 5 miles of Parkland (33067)</p>
  <div class="camp-count" id="totalCount">63 Camps</div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search camps, cities, activities...">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">&#10005;</button>
  </div>
</div>

<!-- FILTER TOGGLE -->
<div class="filter-bar">
  <div class="filter-toggle" id="filterToggle" onclick="toggleFilters()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    Filters

</div>

<!-- FILTER PANEL -->
<div class="filter-panel" id="filterPanel">
  <div class="filter-inner">
    <div class="filter-label">Category</div>
    <div class="filter-row" id="catFilters"></div>
    <div class="filter-label" style="margin-top:8px">City</div>
    <div class="filter-row" id="cityFilters"></div>
    <div class="filter-label" style="margin-top:8px">Price Tier</div>
    <div class="filter-row" id="priceFilters"></div>
  </div>
</div>

<!-- RESULTS BAR -->
<div class="results-bar">
  <div class="results-count" id="resultsCount"></div>
  <div class="sort-wrap">
    <label>Sort</label>
    <select class="sort-select" id="sortSelect" onchange="renderCamps()">
      <option value="name">Name A–Z</option>
      <option value="city">City</option>
      <option value="price">Price Tier</option>
      <option value="age">Min Age</option>
    </select>
  </div>
</div>

<!-- CAMP GRID -->
<div class="camp-grid" id="campGrid"></div>

<!-- BOTTOM NAV -->
<div class="bottom-bar">
  <a href="https://www.livingsavage.com">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    Return to Home
  </a>
</div>

<!-- SELECTION BAR -->
<div class="selection-bar" id="selectionBar">
  <span class="count" id="selCount">0 selected</span>
  <button class="btn btn-compare" onclick="showCompare()">Compare</button>
  <button class="btn btn-export" onclick="exportCSV(true)">Export Selected</button>
  <button class="btn btn-clear" onclick="clearSelections()">Clear</button>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detailModal')">&#10005;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compareModal">
  <div class="modal" style="max-width:95vw;overflow-x:auto">
    <button class="modal-close" onclick="closeModal('compareModal')">&#10005;</button>
    <div class="modal-header"><h2>Compare Camps</h2></div>
    <div class="modal-body" id="compareBody"></div>
  </div>
</div>

const selected=new Set();
const filters={cat:new Set(),city:new Set(),price:new Set()};

const CAT_MAP={
  'Sports':['sports','basketball','soccer','tennis','volleyball','multi_sport','golf camp','training','swim','swimming','tennis camp','hockey','skating','ice skating camp'],
  'Arts & Performance':['arts','art camp','theater','theater arts','dance','dance cheer','dance performing_arts','music','performance'],
  'STEM & Tech':['stem','stem coding','stem robotics','stem science','coding','robotics','science','technology','engineering','invention'],
  'Day Camp':['day_camp','traditional day camp','enrichment','sports stem arts'],
  'Nature & Outdoor':['outdoor','nature','farm outdoor camp','animals','specialty'],
  'Academics':['academics','tutoring','education'],
  'Faith-Based':['religious'],
  'Gymnastics':['gymnastics','gymnastics camp']
};

function getCategory(camp){
  const t=(camp.camp_type||'').toLowerCase();
  for(const[cat,keys]of Object.entries(CAT_MAP)){
    if(keys.some(k=>t.includes(k)))return cat;
  }
  return 'Other';
}

function initFilters(){
  const catDiv=document.getElementById('catFilters');
  Object.keys(CAT_MAP).forEach(cat=>{
    const n=CAMPS.filter(c=>getCategory(c)===cat).length;
    if(n>0)catDiv.innerHTML+=`<button class="chip" data-filter="cat" data-val="${cat}" onclick="toggleFilter(this)">${cat} (${n})</button>`;
  });
  const cityDiv=document.getElementById('cityFilters');
  const cities=[...new Set(CAMPS.map(c=>c.city).filter(Boolean))].sort();
  cities.forEach(city=>{
    const n=CAMPS.filter(c=>c.city===city).length;
    cityDiv.innerHTML+=`<button class="chip" data-filter="city" data-val="${city}" onclick="toggleFilter(this)">${city} (${n})</button>`;
  });
  const priceDiv=document.getElementById('priceFilters');
  ['$','$$','$$$','unknown'].forEach(tier=>{
    const n=CAMPS.filter(c=>(c.price_tier||'unknown')===tier || (tier==='unknown' && !['$','$$','$$$'].includes(c.price_tier))).length;
    if(n>0)priceDiv.innerHTML+=`<button class="chip" data-filter="price" data-val="${tier}" onclick="toggleFilter(this)">${tier==='unknown'?'Not Listed':tier} (${n})</button>`;
  });
}

function toggleFilter(el){
  const type=el.dataset.filter,val=el.dataset.val;
  if(filters[type].has(val)){filters[type].delete(val);el.classList.remove('active')}
  else{filters[type].add(val);el.classList.add('active')}
  renderCamps();
}

function toggleFilters(){
  const p=document.getElementById('filterPanel');
  const t=document.getElementById('filterToggle');
  p.classList.toggle('open');t.classList.toggle('open');
}

function getFiltered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  return CAMPS.filter(c=>{
    if(q){
      const hay=[c.camp_name,c.provider_name,c.city,c.zip,c.camp_type,c.activities,c.address_line1].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    if(filters.cat.size && !filters.cat.has(getCategory(c)))return false;
    if(filters.city.size && !filters.city.has(c.city))return false;
    if(filters.price.size){
      const tier=['$','$$','$$$'].includes(c.price_tier)?c.price_tier:'unknown';
      if(!filters.price.has(tier))return false;
    }
    return true;
  });
}

function sortCamps(list){
  const s=document.getElementById('sortSelect').value;
  return list.sort((a,b)=>{
    if(s==='name')return(a.camp_name||'').localeCompare(b.camp_name||'');
    if(s==='city')return(a.city||'').localeCompare(b.city||'');
    if(s==='price'){
      const o={'$':1,'$$':2,'$$$':3};
      return(o[a.price_tier]||4)-(o[b.price_tier]||4);
    }
    if(s==='age')return(parseInt(a.age_min)||0)-(parseInt(b.age_min)||0);
    return 0;
  });
}

function renderCamps(){
  const list=sortCamps(getFiltered());
  const grid=document.getElementById('campGrid');
  document.getElementById('resultsCount').textContent=list.length+' camp'+(list.length!==1?'s':'')+' found';
  if(!list.length){grid.innerHTML='<div class="no-results"><h3>No camps found</h3><p>Try adjusting your search or filters</p></div>';return;}
  grid.innerHTML=list.map(c=>{
    const cat=getCategory(c);
    const sel=selected.has(c.id)?'selected':'';
    const ages=c.age_min&&c.age_max?c.age_min+'–'+c.age_max:(c.age_min||c.age_max||'');
    const regUrl=c.registration_url||c.website_url||'#';
    return `<div class="camp-card ${sel}" data-id="${c.id}">
      <div class="card-header">
        <div class="card-title-area">
          <div class="card-title">${c.camp_name}</div>
          <div class="card-provider">${c.provider_name||''}</div>
        </div>
        <div class="card-check" onclick="toggleSelect('${c.id}',event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="card-body">
        <div class="card-tags">
          <span class="card-tag">${cat}</span>
          ${c.price_tier&&['$','$$','$$$'].includes(c.price_tier)?'<span class="card-tag" style="background:var(--beige-pale);color:var(--beige-dark)">'+c.price_tier+'</span>':''}
        </div>
        <div class="card-details">
          <div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${c.city||''} ${c.zip||''}</span></div>
          ${ages?'<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Ages <strong>'+ages+'</strong></span></div>':''}
          ${c.price_notes&&c.price_notes!=='not listed'?'<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${c.price_notes}</span></div>':''}
        </div>
      </div>
      <div class="card-footer">
        <button class="btn btn-details" onclick="showDetail('${c.id}')">Details</button>
        <a href="${regUrl}" target="_blank" class="btn btn-register" onclick="event.stopPropagation()">Register</a>
      </div>
    </div>`;
  }).join('');
}

function toggleSelect(id,e){
  e&&e.stopPropagation();
  if(selected.has(id))selected.delete(id);else selected.add(id);
  renderCamps();updateSelBar();
}
function clearSelections(){selected.clear();renderCamps();updateSelBar()}
function updateSelBar(){
  const bar=document.getElementById('selectionBar');
  const cnt=document.getElementById('selCount');
  if(selected.size){bar.classList.add('show');cnt.textContent=selected.size+' selected'}
  else bar.classList.remove('show');
}

function showDetail(id){
  const c=CAMPS.find(x=>x.id===id);if(!c)return;
  const hdr=document.getElementById('modalHeader');
  const body=document.getElementById('modalBody');
  hdr.innerHTML=`<h2>${c.camp_name}</h2><p>${c.provider_name||''}</p>`;
  const field=(label,val)=>val&&val!=='not listed'&&val!=='unknown'&&val!==''?`<div class="modal-item"><span class="label">${label}:</span> <span class="value">${val}</span></div>`:'';
  body.innerHTML=`
    <div class="modal-section"><h3>Overview</h3><div class="modal-grid">
      ${field('Type',c.camp_type)}${field('Format',c.format)}${field('Ages',c.age_min&&c.age_max?c.age_min+'–'+c.age_max:'')}${field('Grades',c.grades)}${field('Status',c.status)}
    </div></div>
    <div class="modal-section"><h3>Location & Contact</h3><div class="modal-grid">
      ${field('Address',c.address_line1)}${field('City/Zip',c.city+', '+c.state+' '+c.zip)}${field('Phone',c.contact_phone)}${field('Email',c.contact_email)}
    </div></div>
    <div class="modal-section"><h3>Schedule & Pricing</h3><div class="modal-grid">
      ${field('Dates',c.dates)}${field('Hours',c.daily_hours)}${field('Days',c.days_of_week)}${field('Price',c.price_notes||c.price_amount)}${field('Price Tier',c.price_tier)}${field('Discounts',c.discounts)}
    </div></div>
    <div class="modal-section"><h3>Details</h3><div class="modal-grid">
      ${field('Activities',c.activities)}${field('Meals',c.meals_included)}${field('Extended Care',c.extended_care)}${field('Transportation',c.transportation)}${field('Required Gear',c.required_gear)}${field('Medical Forms',c.medical_forms_required)}${field('Special Needs',c.special_needs_support_notes)}${field('Safety',c.safety_notes)}
    </div></div>
    <div class="modal-section"><h3>Policies</h3><div class="modal-grid">
      ${field('Refund',c.refund_policy_summary)}${field('Sibling',c.sibling_policy_summary)}
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-details" onclick="closeModal('detailModal')">Close</button>
      <a href="${c.registration_url||c.website_url||'#'}" target="_blank" class="btn btn-register">Register</a>
      ${c.website_url?'<a href="'+c.website_url+'" target="_blank" class="btn" style="background:var(--warm-gray);color:var(--text-secondary)">Website</a>':''}
    </div>`;
  document.getElementById('detailModal').classList.add('active');
}

function showCompare(){
  if(selected.size<2){alert('Select at least 2 camps to compare');return}
  const camps=CAMPS.filter(c=>selected.has(c.id));
  const rows=['camp_name','city','zip','camp_type','age_min','age_max','format','dates','daily_hours','price_tier','price_notes','meals_included','extended_care','transportation','activities'];
  const labels={'camp_name':'Name','city':'City','zip':'Zip','camp_type':'Type','age_min':'Min Age','age_max':'Max Age','format':'Format','dates':'Dates','daily_hours':'Hours','price_tier':'Price Tier','price_notes':'Price Details','meals_included':'Meals','extended_care':'Extended Care','transportation':'Transport','activities':'Activities'};
  let html='<table class="compare-table"><tr><th>Field</th>'+camps.map(c=>'<th>'+c.camp_name+'</th>').join('')+'</tr>';
  rows.forEach(r=>{html+='<tr><td><strong>'+labels[r]+'</strong></td>'+camps.map(c=>'<td>'+(c[r]||'—')+'</td>').join('')+'</tr>'});
  html+='</table>';
  document.getElementById('compareBody').innerHTML=html;
  document.getElementById('compareModal').classList.add('active');
}

function closeModal(id){document.getElementById(id).classList.remove('active')}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active')})});

function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('show');renderCamps()}
document.getElementById('searchInput').addEventListener('input',function(){
  document.getElementById('searchClear').classList.toggle('show',this.value.length>0);
  renderCamps();
});

function exportCSV(selOnly){
  const data=selOnly?CAMPS.filter(c=>selected.has(c.id)):getFiltered();
  if(!data.length){alert('No data to export');return}
  const cols=Object.keys(data[0]);
  let csv=cols.join(',')+String.fromCharCode(10);
  data.forEach(r=>{csv+=cols.map(c=>{let v=(r[c]||'').toString();if(v.includes(',')||v.includes('"'))v='"'+v.replace(/"/g,'""')+'"';return v}).join(',')+String.fromCharCode(10)});
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='summer-camps-2026.csv';a.click();
}

initFilters();
renderCamps();
</script>
</body>
